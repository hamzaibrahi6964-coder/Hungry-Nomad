<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | Hungry Nomad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="simple-auth-page">
    <div class="simple-auth-card">
      <h1>Create Account</h1>
      <p>Sign up to place and track your orders.</p>

      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="tel" id="phone" placeholder="Phone Number" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>

      <p id="message"></p>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const signupForm = document.getElementById("signupForm");
    const message = document.getElementById("message");

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCredential.user.uid), {
          uid: userCredential.user.uid,
          full_name: name,
          phone: phone,
          email: email,
          role: "customer",
          createdAt: new Date().toISOString()
        });

        message.textContent = "Signup successful. Redirecting to login...";
        signupForm.reset();

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>

</body>
</html>
